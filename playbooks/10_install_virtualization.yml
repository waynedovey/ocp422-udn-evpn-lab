---
- name: Install OpenShift Virtualization
  hosts: all
  become: false
  gather_facts: false
  tasks:
    - name: Install OpenShift Virtualization Operator and HyperConverged
      ansible.builtin.shell: |
        set -euo pipefail
        export PATH={{ installer_bin_dir }}:$PATH
        export KUBECONFIG={{ kubeconfig_path }}

        echo "# Installing OpenShift Virtualization"
        echo "Site: {{ site_id }}"
        echo

        cat <<'MANIFEST' | oc apply -f -
        apiVersion: v1
        kind: Namespace
        metadata:
          name: openshift-cnv
          labels:
            openshift.io/cluster-monitoring: "true"
        ---
        apiVersion: operators.coreos.com/v1
        kind: OperatorGroup
        metadata:
          name: kubevirt-hyperconverged-group
          namespace: openshift-cnv
        spec:
          targetNamespaces:
          - openshift-cnv
        ---
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        metadata:
          name: hco-operatorhub
          namespace: openshift-cnv
        spec:
          source: redhat-operators
          sourceNamespace: openshift-marketplace
          name: kubevirt-hyperconverged
          channel: stable
          installPlanApproval: Automatic
        MANIFEST

        echo
        echo "Waiting for OpenShift Virtualization CSV to reach Succeeded..."

        for i in $(seq 1 90); do
          csv="$(oc get sub hco-operatorhub -n openshift-cnv -o jsonpath='{.status.installedCSV}' 2>/dev/null || true)"

          if [ -n "$csv" ]; then
            phase="$(oc get csv "$csv" -n openshift-cnv -o jsonpath='{.status.phase}' 2>/dev/null || true)"
            echo "CSV: $csv phase=$phase"

            if [ "$phase" = "Succeeded" ]; then
              break
            fi
          else
            echo "CSV not created yet..."
          fi

          sleep 20
        done

        csv="$(oc get sub hco-operatorhub -n openshift-cnv -o jsonpath='{.status.installedCSV}' 2>/dev/null || true)"
        if [ -z "$csv" ]; then
          echo "ERROR: Subscription did not create an installedCSV"
          oc get sub,csv,installplan -n openshift-cnv || true
          exit 1
        fi

        phase="$(oc get csv "$csv" -n openshift-cnv -o jsonpath='{.status.phase}' 2>/dev/null || true)"
        if [ "$phase" != "Succeeded" ]; then
          echo "ERROR: OpenShift Virtualization CSV did not reach Succeeded"
          oc get sub,csv,installplan -n openshift-cnv || true
          exit 1
        fi

        cat <<'MANIFEST' | oc apply -f -
        apiVersion: hco.kubevirt.io/v1beta1
        kind: HyperConverged
        metadata:
          name: kubevirt-hyperconverged
          namespace: openshift-cnv
        spec: {}
        MANIFEST

        echo
        echo "Waiting for HyperConverged Available=True..."

        for i in $(seq 1 90); do
          available="$(oc get hco kubevirt-hyperconverged -n openshift-cnv -o jsonpath='{.status.conditions[?(@.type=="Available")].status}' 2>/dev/null || true)"
          progressing="$(oc get hco kubevirt-hyperconverged -n openshift-cnv -o jsonpath='{.status.conditions[?(@.type=="Progressing")].status}' 2>/dev/null || true)"
          echo "Available=$available Progressing=$progressing"

          if [ "$available" = "True" ]; then
            break
          fi

          sleep 20
        done

        available="$(oc get hco kubevirt-hyperconverged -n openshift-cnv -o jsonpath='{.status.conditions[?(@.type=="Available")].status}' 2>/dev/null || true)"
        if [ "$available" != "True" ]; then
          echo "ERROR: HyperConverged did not become Available=True"
          oc get hco kubevirt-hyperconverged -n openshift-cnv -o yaml || true
          oc get pods -n openshift-cnv || true
          exit 1
        fi

        echo
        echo "# OpenShift Virtualization status"
        oc get hco kubevirt-hyperconverged -n openshift-cnv
        oc get pods -n openshift-cnv
      register: virt_install
      changed_when: true

    - name: Print OpenShift Virtualization install result
      ansible.builtin.debug:
        msg: "{{ virt_install.stdout }}"
